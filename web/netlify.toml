# Netlify Configuration File
# Controls publish paths and custom HTTP headers for security

[build]
  # Publish directory containing assets (relative to site root)
  publish = "."

# Custom HTTP Response Headers for security hardening
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Content-Security-Policy = "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.botframework.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://*.botframework.com https://*.powerapps.com;"

# Routing Redirect Rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
